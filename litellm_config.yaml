# LiteLLM Proxy Configuration for Vertex AI (via vertex-openai-proxy)
# Routes OpenAI-compatible requests through the vertex-openai-proxy to Vertex AI
#
# INSTRUCTIONS:
#   1. Set VERTEX_PROXY_URL to your vertex-openai-proxy Railway URL (e.g. https://vertex-openai-proxy-production.up.railway.app/v1)
#   2. Set VERTEX_API_KEY to the PROXY_API_KEY configured on the proxy service
#   3. No GCP credentials needed here — the proxy handles authentication

model_list:
  # Primary model: Gemma 4 31B IT on Vertex AI dedicated endpoint (via proxy)
  - model_name: gemma-4-31b-it
    litellm_params:
      model: openai/gemma-4-31b-it
      api_base: os.environ/VERTEX_PROXY_URL
      api_key: os.environ/VERTEX_API_KEY

  # Alias so OpenClaw can reference it with a simple name
  - model_name: gemma
    litellm_params:
      model: openai/gemma-4-31b-it
      api_base: os.environ/VERTEX_PROXY_URL
      api_key: os.environ/VERTEX_API_KEY

general_settings:
  # Master key for authenticating requests to the LiteLLM proxy
  # This will be set via LITELLM_MASTER_KEY env var at runtime
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  # Drop unsupported params instead of erroring
  drop_params: true
  # Set reasonable defaults
  request_timeout: 120
